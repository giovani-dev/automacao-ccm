repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: poetry run black .
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

      - id: pylint
        name: pylint
        entry: poetry run pylint src
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy (src/)
        entry: poetry run mypy src
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
